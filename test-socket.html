<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Socket.io - Suivi GPS par livraison</title>
</head>
<body>
    <h2>Simulateur Livreur</h2>
    <p>Livraison ID : <input type="number" id="livraisonId" value="1"></p>
    <button onclick="rejoindre()">Rejoindre la livraison</button>
    <button onclick="envoyerPosition()">Envoyer ma position</button>

    <h2>Position recue par le client</h2>
    <p id="position">En attente...</p>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("http://localhost:3000");

        socket.on('connect', () => {
            console.log('Connecte au serveur', socket.id);
        });

        function rejoindre() {
            const livraisonId = document.getElementById('livraisonId').value;
            socket.emit('rejoindre_livraison', livraisonId);
            console.log('A rejoint la livraison', livraisonId);
        }

        function envoyerPosition() {
            const livraisonId = document.getElementById('livraisonId').value;
            const data = {
                livraison_id: livraisonId,
                livreur_id: 1,
                latitude: 14.6928 + (Math.random() * 0.01),
                longitude: -17.4467 + (Math.random() * 0.01)
            };
            socket.emit('position_gps', data);
            console.log('Position envoyee :', data);
        }

        socket.on('position_mise_a_jour', (data) => {
            document.getElementById('position').innerText = 
                `Livraison ${data.livraison_id} : ${data.latitude.toFixed(5)}, ${data.longitude.toFixed(5)}`;
        });
    </script>
</body>
</html>
